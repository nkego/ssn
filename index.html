<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Змейка</title>
    <link rel="stylesheet" href="style.css">
    <!-- Загружаем SDK с defer, чтобы не блокировать рендер -->
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
</head>
<body>
    <div class="game-wrapper">
        <div class="score">Счёт: <span id="score">0</span></div>
        <canvas id="game"></canvas>
        <div class="controls">
            <button id="start-btn">▶ Старт</button>
        </div>
        <div class="touch-pad">
            <button class="dir" data-dir="up">↑</button>
            <div class="row">
                <button class="dir" data-dir="left">←</button>
                <button class="dir" data-dir="down">↓</button>
                <button class="dir" data-dir="right">→</button>
            </div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
