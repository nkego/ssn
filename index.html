<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Змейка Telegram</title>
    <link rel="stylesheet" href="style.css">
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="game-wrapper">
        <div class="score">Счёт: <span id="score">0</span></div>
        <canvas id="game"></canvas>
        <div class="controls">
            <button id="start-btn">▶ Старт</button>
        </div>
        <!-- Кнопки для мобильных -->
        <div class="touch-pad">
            <button class="dir" data-dir="up">↑</button>
            <div class="row">
                <button class="dir" data-dir="left">←</button>
                <button class="dir" data-dir="down">↓</button>
                <button class="dir" data-dir="right">→</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
