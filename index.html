<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Змейка</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="wrapper">
        <div class="score">Счёт: <span id="score">0</span></div>
        <canvas id="game" width="300" height="300"></canvas>
        <button id="start-btn" class="btn-main">▶ Старт</button>
        <div class="controls">
            <button class="ctrl-btn" data-dir="up">↑</button>
            <div class="row">
                <button class="ctrl-btn" data-dir="left">←</button>
                <button class="ctrl-btn" data-dir="down">↓</button>
                <button class="ctrl-btn" data-dir="right">→</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
