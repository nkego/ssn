<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сапёр</title>
    <link rel="stylesheet" href="style.css">
    <!-- SDK загружаем без defer, чтобы tg был доступен сразу -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loader">⏳ Загрузка...</div>
    <div id="app" style="display: none;">
        <div id="header">
            <div class="stat" id="timer">⏱ 000</div>
            <div class="stat" id="mines-left">💣 10</div>
        </div>
        <div id="controls">
            <button id="mode-btn" class="active">⛏️</button>
            <button id="mode-btn-flag">🚩</button>
        </div>
        <div id="grid"></div>
        <button id="new-game">🔄 Новая игра</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
